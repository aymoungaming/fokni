<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - Firma</title>
    <link rel="stylesheet" href="creation.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <div class="signup-card">
            
            <div class="card-header">
                <h2>Bienvenue chez Firma <i class="fa-solid fa-leaf"></i></h2>
                <p>Créez votre compte pour accéder au marketplace et aux outils d'analyse.</p>
            </div>

            <form action="#" method="POST">
                
                <div class="form-row">
                    <div class="input-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
                    </div>
                    <div class="input-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="phone">Numéro de téléphone</label>
                    <input type="tel" id="phone" name="phone" placeholder="ex: 06 12 34 56 78" required>
                </div>

                <div class="input-group">
                    <label for="email">Adresse E-mail</label>
                    <input type="email" id="email" name="email" placeholder="exemple@mail.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="Minimum 8 caractères" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Répétez le mot de passe" required>
                </div>

                <button type="submit" class="btn-submit">Créer mon compte</button>
            
            </form>

            <div class="card-footer">
                <p>Vous avez déjà un compte ? <a href="connect.html">Se connecter</a></p>
                <p><a href="home.html">Retour à l'accueil</a></p>
            </div>

        </div>
    </div>
</body>
<script>
    const form = document.querySelector('form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault(); // Empêche le rechargement de la page

        // Récupération des données
        const nom = document.getElementById('nom').value;
        const prenom = document.getElementById('prenom').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPass = document.getElementById('confirm-password').value;

        // Vérification basique
        if (password !== confirmPass) {
            alert("Les mots de passe ne correspondent pas !");
            return;
        }

        // Envoi au Backend
        try {
            const response = await fetch('http://localhost:3000/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nom, prenom, phone, email, password })
            });

            const data = await response.json();

            if (response.ok) {
                alert("Inscription réussie ! Connectez-vous maintenant.");
                window.location.href = 'connect.html'; // Redirection vers login
            } else {
                alert("Erreur : " + data.message);
            }
        } catch (error) {
            console.error("Erreur:", error);
            alert("Impossible de contacter le serveur.");
        }
    });
</script>
</html>
