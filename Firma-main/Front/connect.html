<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Firma</title>
    <link rel="stylesheet" href="connect.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="main-container">
        <div class="login-card">
            
            <div class="card-header">
                <h2>Ravi de vous revoir ! <i class="fa-solid fa-seedling"></i></h2>
                <p>Connectez-vous pour gérer vos cultures.</p>
            </div>

            <form action="#" method="POST">
                
                <div class="input-group">
                    <label for="email">Adresse E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope icon"></i>
                        <input type="email" id="email" name="email" placeholder="Entrez votre email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock icon"></i>
                        <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required>
                    </div>
                </div>

                <div class="forgot-password">
                    <a href="#">Mot de passe oublié ?</a>
                </div>
                <button type="submit" class="btn-login">Se connecter</button>
                
            
            </form>

            <div class="card-footer">
                <p>Pas encore de compte ? <a href="creation.html">S'inscrire</a></p>
                <p><a href="home.html">Retour à l'accueil</a></p>
            </div>

        </div>
    </div>
</body>
<script>
    const form = document.querySelector('form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('http://localhost:3000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // On stocke les infos utilisateur dans le navigateur pour s'en souvenir
                localStorage.setItem('user', JSON.stringify(data.user));
                
                alert("Bienvenue " + data.user.nom + " !");
                window.location.href = 'home.html'; // Redirection vers le site
            } else {
                alert("Erreur : " + data.message);
            }
        } catch (error) {
            console.error("Erreur:", error);
            alert("Erreur de connexion.");
        }
    });
</script>
</html>
