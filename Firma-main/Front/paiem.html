<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Sécurisé - Agritech</title>
    <link rel="stylesheet" href="paiem.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="payment-wrapper">
        
        <div class="order-info">
            <h2>Résumé de la commande</h2>
            <div class="item-details">
                <p id="item-name">Abonnement Premium (1 Mois)</p>
                <span class="price" id="item-price">29.00 TND</span>
            </div>
            <div class="total-row">
                <span>Total à payer</span>
                <span class="total-amount" id="total-amount">29.00 TND</span>
            </div>
            <div class="secure-badge">
                <i class="fas fa-lock"></i> Paiement 100% Sécurisé (SSL)
            </div>
        </div>

        <div class="payment-form-container">
            
            <div class="card-visual">
                <div class="card-chip"></div>
                <div class="card-logo">VISA</div>
                <div class="card-number-display">•••• •••• •••• ••••</div>
                <div class="card-details">
                    <div class="card-holder">NOM DU TITULAIRE</div>
                    <div class="card-expires">MM/YY</div>
                </div>
            </div>

            <form id="paymentForm">
                <div class="input-group">
                    <label>Titulaire de la carte</label>
                    <input type="text" placeholder="M. Foulen Ben Foulen" required>
                    <i class="fas fa-user input-icon"></i>
                </div>

                <div class="input-group">
                    <label>Numéro de carte</label>
                    <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" required>
                    <i class="fas fa-credit-card input-icon"></i>
                </div>

                <div class="row">
                    <div class="input-group half">
                        <label>Expiration</label>
                        <input type="text" placeholder="MM/AA" maxlength="5" required>
                    </div>
                    <div class="input-group half">
                        <label>CVC / CVV</label>
                        <input type="password" placeholder="123" maxlength="3" required>
                        <i class="fas fa-question-circle tooltip-icon" title="Les 3 derniers chiffres au dos"></i>
                    </div>
                </div>

                <button type="submit" class="pay-btn" id="payButton">
                    Payer <span id="btn-amount">29.00 TND</span> <i class="fas fa-arrow-right"></i>
                </button>
                
                <a href="javascript:history.back()" class="cancel-link">Annuler la transaction</a>
            </form>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));

        if (!user) {
            // S'il n'est pas connecté, on le renvoie à l'accueil
            window.location.href = 'home.html';
        }
        // Simulation de la récupération des paramètres (Premium vs Engrais)
        // Dans la vraie vie, ces infos viendraient de l'URL (ex: payment.html?type=fertilizer&price=50)
        
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type'); // 'premium' ou 'product'
        const price = urlParams.get('price');

        if(type === 'product' && price) {
            document.getElementById('item-name').textContent = "Achat : Engrais Organique";
            document.getElementById('item-price').textContent = price + " TND";
            document.getElementById('total-amount').textContent = price + " TND";
            document.getElementById('btn-amount').textContent = price + " TND";
        }

        // Petit script pour formater le numéro de carte (espaces automatiques)
        document.getElementById('cardNumber').addEventListener('input', function (e) {
            e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
        });

        // Simulation du paiement
        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('payButton');
            
            // Animation de chargement
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Traitement...';
            btn.style.opacity = "0.7";
            
            setTimeout(() => {
                alert("Paiement accepté ! Merci de votre confiance.");
                window.location.href = "market.html"; // Redirection vers l'accueil
            }, 2000);
        });
    </script>
</body>
</html>
